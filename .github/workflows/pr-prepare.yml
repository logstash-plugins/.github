name: Prepare PR

on:
  workflow_call:

jobs:
  notify-instructions:
    name: Post instructions
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      pull-requests: write
    steps:
      - name: Post comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "### Changelog and Version Management

          Before merging, add a comment to this PR with the following format to automatically update the changelog and version:

          \`\`\`
          /pr_prepare release:patch
          - Your changelog entry here
            - Subentry (optional)
          \`\`\`

          **Available commands:**

          | Command | Description |
          |---------|-------------|
          | \`/pr_prepare changelog:add\` | Add changelog entry without version bump |
          | \`/pr_prepare release:patch\` | Bump patch version and update changelog |
          | \`/pr_prepare release:minor\` | Bump minor version and update changelog |
          | \`/pr_prepare release:major\` | Bump major version and update changelog (only for PRs targeting \`main\`) |

          **Notes:**
          - If no changelog entry is provided, the PR title will be used. Only alphanumeric characters, spaces, and common punctuation are allowed.
          - If multiple \`/pr_prepare\` comments are added, the last one will be used.
          - Changes are committed to the base branch after the PR is merged."

  prepare-pr:
    name: Update changelog and version
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    permissions:
      contents: write
    # Flow: find command comment → parse it → build changelog entry → fetch files → compute updates → commit
    steps:
      - name: Find pr_prepare comment
        id: find-comment
        uses: actions/github-script@v9
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.payload.repository.owner.login,
              repo: context.payload.repository.name,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });

            const prPrepareComments = comments.filter(c => c.body.trim().startsWith('/pr_prepare'));
            if (prPrepareComments.length === 0) {
              core.info('No /pr_prepare comment found, skipping');
              core.setOutput('found', 'false');
              return;
            }

            const lastComment = prPrepareComments[prPrepareComments.length - 1];
            core.setOutput('found', 'true');
            core.setOutput('body', lastComment.body);

      - name: Parse command
        if: steps.find-comment.outputs.found == 'true'
        id: parse-command
        uses: actions/github-script@v9
        env:
          COMMENT_BODY: ${{ steps.find-comment.outputs.body }}
        with:
          script: |
            const body = process.env.COMMENT_BODY;
            const firstLine = body.split('\n')[0].trim();

            const commandMatch = firstLine.match(/^\/pr_prepare\s+(release:major|release:minor|release:patch|changelog:add)$/);
            if (!commandMatch) {
              throw new Error(`Invalid /pr_prepare command: ${firstLine}`);
            }

            const command = commandMatch[1];
            if (command === 'release:major' && context.payload.pull_request.base.ref !== 'main') {
              throw new Error('release:major is only supported on PRs targeting main');
            }

            core.setOutput('command', command);

      - name: Build changelog entry
        if: steps.find-comment.outputs.found == 'true'
        id: build-entry
        uses: actions/github-script@v9
        env:
          COMMENT_BODY: ${{ steps.find-comment.outputs.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          script: |
            const body = process.env.COMMENT_BODY;
            const lines = body.split('\n').slice(1).filter(l => l.trim().length > 0);
            const prNumber = context.payload.pull_request.number;
            const repoName = context.payload.repository.name;
            const repoOwner = context.payload.repository.owner.login;
            const prUrl = `https://github.com/${repoOwner}/${repoName}/pull/${prNumber}`;

            let entry;
            if (lines.length > 0) {
              const entryLines = lines.map(line => {
                if (line.match(/^- /)) {
                  const text = line.replace(/^-\s*/, '').trim();
                  return `  - ${text} [#${prNumber}](${prUrl})`;
                }
                return `  ${line}`;
              });
              entry = entryLines.join('\n');
            } else {
              const prTitle = process.env.PR_TITLE;
              const unsafeChars = prTitle.match(/[^a-zA-Z0-9 _.,:;+=#@()\-]/g);
              if (unsafeChars) {
                throw new Error(`PR title contains unsupported characters: ${[...new Set(unsafeChars)].join(' ')}`);
              }
              entry = `  - ${prTitle} [#${prNumber}](${prUrl})`;
            }

            core.setOutput('entry', entry);

      - name: Fetch version and changelog files
        if: steps.find-comment.outputs.found == 'true'
        id: fetch-files
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const repo = context.payload.repository.name;
            const ref = context.payload.pull_request.base.ref;

            for (const path of ['version', 'VERSION']) {
              try {
                const { data } = await github.rest.repos.getContent({ owner: context.payload.repository.owner.login, repo, path, ref });
                fs.writeFileSync('version-content', Buffer.from(data.content, 'base64').toString('utf8'));
                core.setOutput('version-path', path);
                break;
              } catch (e) {
                if (path === 'VERSION') throw new Error('No version file found');
              }
            }

            const { data: changelogFile } = await github.rest.repos.getContent({
              owner: context.payload.repository.owner.login, repo, path: 'CHANGELOG.md', ref
            });
            fs.writeFileSync('changelog-content', Buffer.from(changelogFile.content, 'base64').toString('utf8'));

      - name: Compute new version and changelog
        if: steps.find-comment.outputs.found == 'true'
        id: compute
        uses: actions/github-script@v9
        env:
          COMMAND: ${{ steps.parse-command.outputs.command }}
          ENTRY: ${{ steps.build-entry.outputs.entry }}
        with:
          script: |
            const fs = require('fs');
            const command = process.env.COMMAND;
            const entry = process.env.ENTRY;

            const versionContent = fs.readFileSync('version-content', 'utf8');
            const match = versionContent.match(/(\d+)\.(\d+)\.(\d+)/);
            if (!match) throw new Error('Could not parse version number');
            let [, major, minor, patch] = match.map(Number);

            let newVersion;
            switch (command) {
              case 'release:major': newVersion = `${major + 1}.0.0`; break;
              case 'release:minor': newVersion = `${major}.${minor + 1}.0`; break;
              case 'release:patch': newVersion = `${major}.${minor}.${patch + 1}`; break;
            }

            const changelog = fs.readFileSync('changelog-content', 'utf8');
            let newChangelog;
            if (command === 'changelog:add') {
              const lines = changelog.split('\n');
              lines.splice(1, 0, entry);
              newChangelog = lines.join('\n');
            } else {
              newChangelog = `## ${newVersion}\n${entry}\n\n${changelog}`;
            }

            fs.writeFileSync('new-changelog', newChangelog);
            if (command !== 'changelog:add') {
              fs.writeFileSync('new-version-content', versionContent.replace(/\d+\.\d+\.\d+/, newVersion));
            }

            const commitMessage = command === 'changelog:add'
              ? 'Add changelog entry'
              : `Update changelog and bump version to ${newVersion}`;
            fs.writeFileSync('commit-message', commitMessage);

      - name: Create file blobs
        if: steps.find-comment.outputs.found == 'true'
        id: create-blobs
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const repo = context.payload.repository.name;

            const newChangelog = fs.readFileSync('new-changelog', 'utf8');
            const { data: changelogBlob } = await github.rest.git.createBlob({
              owner: context.payload.repository.owner.login, repo, content: newChangelog, encoding: 'utf-8'
            });

            const tree = [{
              path: 'CHANGELOG.md', mode: '100644', type: 'blob', sha: changelogBlob.sha
            }];

            if (fs.existsSync('new-version-content')) {
              const newVersionContent = fs.readFileSync('new-version-content', 'utf8');
              const versionPath = '${{ steps.fetch-files.outputs.version-path }}';
              const { data: versionBlob } = await github.rest.git.createBlob({
                owner: context.payload.repository.owner.login, repo, content: newVersionContent, encoding: 'utf-8'
              });
              tree.push({
                path: versionPath, mode: '100644', type: 'blob', sha: versionBlob.sha
              });
            }

            core.setOutput('tree', JSON.stringify(tree));

      - name: Commit and push
        if: steps.find-comment.outputs.found == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const repo = context.payload.repository.name;
            const baseRef = context.payload.pull_request.base.ref;
            const message = fs.readFileSync('commit-message', 'utf8').trim();
            const tree = JSON.parse('${{ steps.create-blobs.outputs.tree }}');

            const { data: ref } = await github.rest.git.getRef({
              owner: context.payload.repository.owner.login, repo, ref: `heads/${baseRef}`
            });
            const baseSha = ref.object.sha;

            const { data: baseCommit } = await github.rest.git.getCommit({
              owner: context.payload.repository.owner.login, repo, commit_sha: baseSha
            });

            // Include the original commit message in the new commit to provide more context in the history.
            const prevMessage = baseCommit.message.split('\n')[0];
            const fullMessage = `${message} for '${prevMessage}'`;

            const { data: newTree } = await github.rest.git.createTree({
              owner: context.payload.repository.owner.login, repo, base_tree: baseCommit.tree.sha, tree
            });

            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.payload.repository.owner.login, repo, message: fullMessage,
              tree: newTree.sha,
              parents: [baseSha],
              author: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              },
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              }
            });

            await github.rest.git.updateRef({
              owner: context.payload.repository.owner.login, repo, ref: `heads/${baseRef}`, sha: newCommit.sha
            });

            core.info(`${fullMessage} (${newCommit.sha.substring(0, 7)})`);
